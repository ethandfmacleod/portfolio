name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23

      - name: Install dependencies
        run: npm install

      - name: Run Linting (ESLint)
        run: npm run lint

      - name: Run Prettier (format:check)
        run: npm run format:check

      - name: Run Commitlint
        run: |
          echo "Linting HEAD commit message..."
          git log -1 --pretty=format:%s HEAD | npx commitlint

